# AI Chat UI Services for Hestia
# Optional web-based chat interfaces for interacting with AI backends
# All services are optional and can be enabled via Docker profiles
#
# Usage:
#   docker compose --profile openwebui up -d    # Start Open WebUI (Synap-integrated)
#   docker compose --profile lobechat up -d     # Start LobeChat (Ollama only)
#   docker compose --profile ai-chat-all up -d  # Start all chat UIs

version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # OPEN WEBUI — Synap-integrated chat UI (PRIMARY)
  # ═══════════════════════════════════════════════════════════════════════════
  # Integration points:
  #   1. Synap IS as custom OpenAI-compat endpoint (synap/auto, synap/balanced…)
  #   2. Synap Hub MCP server for memory, entities, skills (POST /mcp)
  #   3. Ollama as local/offline fallback (auto-discovered via OLLAMA_BASE_URL)
  #
  # Required: SYNAP_API_KEY, SYNAP_IS_URL (IS base URL)
  # Optional: OLLAMA_BASE_URL, OPENAI_API_KEY
  #
  # No external database — Open WebUI uses SQLite by default.
  # Data persisted in the hestia-openwebui-data volume.
  # ═══════════════════════════════════════════════════════════════════════════
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: hestia-openwebui
    restart: unless-stopped
    profiles:
      - openwebui
      - ai-chat-all
    environment:
      # ── Core ──────────────────────────────────────────────────────────────
      - ENV=production
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-me-in-production}
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true

      # ── Synap IS as primary OpenAI-compat endpoint ────────────────────────
      # The IS exposes /v1/chat/completions with synap/* model aliases.
      # OPENAI_API_BASE_URL must NOT have a trailing /v1 — Open WebUI appends it.
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URL=${SYNAP_IS_URL:-http://intelligence-hub:3001}/v1
      - OPENAI_API_KEY=${SYNAP_API_KEY}

      # ── Ollama (local/offline fallback, auto-discovered) ──────────────────
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://eve-brain-ollama:11434}

      # ── MCP — Synap Hub (memory, entities, skills as tools) ──────────────
      # Open WebUI calls MCP servers via its built-in tool runner.
      # Auth header is injected via WEBUI_MCP_CONFIG (JSON).
      - WEBUI_MCP_CONFIG=${WEBUI_MCP_CONFIG:-}

      # ── Features ──────────────────────────────────────────────────────────
      - ENABLE_RAG=true
      - ENABLE_WEB_SEARCH=true
      - WEB_SEARCH_ENGINE=duckduckgo
      - ENABLE_IMAGE_GENERATION=false

      # ── User management ───────────────────────────────────────────────────
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-true}
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-user}
      - ENABLE_COMMUNITY_SHARING=false
    ports:
      - "3011:8080"
    volumes:
      - hestia-openwebui-data:/app/backend/data
    networks:
      - hestia-network
      - eve-network   # must share network with IS + synap-backend for MCP + endpoint access
    labels:
      - "hestia.service=openwebui"
      - "hestia.description=Synap-integrated chat UI (IS endpoint + Hub MCP tools)"
      - "hestia.port=3011"

  # ═══════════════════════════════════════════════════════════════════════════
  # LOBECHAT - Modern AI Chat Interface (Ollama-focused, optional)
  # ═══════════════════════════════════════════════════════════════════════════
  # Best for: users who want a polished UI with a plugin marketplace.
  # Does NOT have native MCP support — use Open WebUI for Synap integration.
  # Default Port: 3010
  # ═══════════════════════════════════════════════════════════════════════════
  lobechat:
    image: lobehub/lobe-chat:latest
    container_name: hestia-lobechat
    restart: unless-stopped
    profiles:
      - lobechat
      - ai-chat-all
    environment:
      - OLLAMA_PROXY_URL=${OLLAMA_BASE_URL:-http://eve-brain-ollama:11434}
      - OLLAMA_MODEL_LIST=${OLLAMA_MODEL_LIST:-llama3.2,llama3.1:8b,mistral}
      - ACCESS_CODE=${LOBECHAT_ACCESS_CODE:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    ports:
      - "3010:3210"
    volumes:
      - hestia-lobechat-data:/app/.lobechat
    networks:
      - hestia-network
    labels:
      - "hestia.service=lobechat"
      - "hestia.description=Modern AI Chat UI with plugin ecosystem (Ollama-focused)"
      - "hestia.port=3010"

# ═══════════════════════════════════════════════════════════════════════════
# VOLUMES for AI Chat Services
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  hestia-openwebui-data:
    driver: local
  hestia-lobechat-data:
    driver: local
